name: Load Credentials

on:
  workflow_call:
    inputs:
      registry:
        description: 'Container registry host'
        required: true
        type: string
      image_name:
        description: 'Docker image name'
        required: true
        type: string
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true

jobs:
  login:
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ inputs.registry }}
      image_name: ${{ inputs.image_name }}
    steps:
      - name: Log in to container registry
        uses: docker/login-action@v5
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Export workflow outputs
        run: |
          echo "registry=${{ inputs.registry }}" >> "$GITHUB_OUTPUT"
          echo "image_name=${{ inputs.image_name }}" >> "$GITHUB_OUTPUT"
